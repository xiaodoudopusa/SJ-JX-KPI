<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>晟捷绩效考核表（KPI）</title>
  <style>
    :root{
      --accent:#0db36b; --accent-dark:#0a8a52; --muted:#6b776e;
    }
    html,body{
      height:100%; margin:0; padding:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(135deg, #e8fff5 0%, #b9f3d1 30%, #7fe1a1 60%, #4fc07a 100%);
      -webkit-font-smoothing:antialiased;
    }
    .center-wrap{
      min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px;
      box-sizing:border-box;
    }
    .card{
      width:100%; max-width:520px; background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(250,255,250,0.95));
      border-radius:16px; box-shadow: 0 10px 30px rgba(6, 60, 36, 0.12); padding:28px; text-align:center;
      border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(6px);
    }
    .brand{ display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:14px; }
    .logo{
      width:56px;
      height:56px;
      border-radius:12px;
      background: linear-gradient(135deg,var(--accent),var(--accent-dark));
      box-shadow: 0 6px 18px rgba(11,179,107,0.18);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:700;
      font-size:20px;
    }
    h1{ margin:0; font-size:20px; color:#05321a; }
    .lead { margin:10px 0 18px; color:var(--muted); font-size:14px; }
    .input-row{ display:flex; gap:10px; align-items:center; justify-content:center; margin-top:6px; }
    input[type="password"]{ flex:1; padding:12px 14px; font-size:16px; border-radius:10px; border:1px solid rgba(10,10,10,0.06); outline:none; }
    button { background: linear-gradient(180deg,var(--accent),var(--accent-dark)); color:#fff; border:0; padding:10px 14px; font-size:15px; border-radius:10px; cursor:pointer; box-shadow: 0 8px 16px rgba(11,179,107,0.18); }
    button.ghost { background: transparent; color: #05462a; border: 1px solid rgba(5,70,42,0.08); box-shadow: none; }
    .hint { margin-top:12px; color:var(--muted); font-size:13px; }
    .full-iframe { position: fixed !important; top:0; left:0; right:0; bottom:0; width:100% !important; height:100% !important; border:0; z-index:999; background:#fff; }
    .loading-overlay{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.9); z-index:1001; font-size:16px; color:#084a28; }
    .blocked-overlay { position:fixed; inset: 18px; margin:auto; max-width:880px; z-index:1002; background: rgba(255,255,255,0.98); border-radius:12px; padding:18px; box-shadow: 0 10px 30px rgba(6,60,36,0.12); color:#08361f; text-align:left; }
    .hidden { display:none !important; }
    @media (max-width:560px){ .card{ padding:18px; border-radius:12px; } input[type="password"]{ padding:10px; } button{ padding:10px 12px; } .logo{ width:48px; height:48px; } }
  </style>
</head>
<body>
<script>
/* ====== CONFIG: paste the block generated by encrypt.py here (replace these placeholder values) ====== */
// Replace these lines with encrypt.py output block (exactly)
const ITERATIONS = 200000;
const SALT_B64 = "G/1HiwQ/GRxZilNEG1SUTg==";
const IV_B64   = "h0Lqqk7tp8nBbsb6";
const CIPHER_B64 = "GlhalK6L1rIJIU6cMaiVQQNABPa2LlOIXQPJQHpMrgSEhwx5U1RpczzsHqKGi6tMrBoQVaW04V1gPY/P8I4=";
// ================================================================================================
</script>

  <div class="center-wrap">
    <div id="entry" class="card" role="form" aria-labelledby="title">
      <div class="brand">
        <div class="logo" aria-hidden="true" title="绩效趋势图标">
          <!-- Inline SVG: 树状条形 + 上升折线（绩效分析风格） -->
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- bars -->
            <rect x="4"  y="20" width="5" height="12" rx="1" fill="rgba(255,255,255,0.95)"/>
            <rect x="11" y="14" width="5" height="18" rx="1" fill="rgba(255,255,255,0.9)"/>
            <rect x="18" y="9"  width="5" height="23" rx="1" fill="rgba(255,255,255,0.85)"/>
            <rect x="25" y="5"  width="5" height="27" rx="1" fill="rgba(255,255,255,0.8)"/>
            <!-- line graph -->
            <polyline points="6,24 13,17 20,12 28,8" fill="none" stroke="#0a8a52" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="6" cy="24" r="1.6" fill="#fff"/>
            <circle cx="13" cy="17" r="1.6" fill="#fff"/>
            <circle cx="20" cy="12" r="1.6" fill="#fff"/>
            <circle cx="28" cy="8" r="1.6" fill="#fff"/>
          </svg>
        </div>
        <div style="text-align:left">
          <h1 id="title">受保护的页面</h1>
        </div>
      </div>

      <!-- removed the explanatory lead and the final caution lines per request -->

      <div class="input-row" aria-live="polite">
        <input id="pw" type="password" placeholder="输入密码" autocomplete="current-password" />
        <button id="ok" title="确认">确认</button>
      </div>

      <div style="display:flex; gap:8px; justify-content:center; margin-top:12px;">
        <button id="clear" class="ghost" title="清空">清空</button>
        <div id="msg" style="align-self:center; color:#a0321f;"></div>
      </div>
    </div>
  </div>

<script>
/* ===== 页面逻辑（不含任何明文模式或打开新标签的功能） ===== */
function b64ToBuf(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }
function bufToStr(buf){ return new TextDecoder().decode(buf); }

const pwInput = document.getElementById('pw');
const okBtn = document.getElementById('ok');
const clearBtn = document.getElementById('clear');
const msg = document.getElementById('msg');
const entry = document.getElementById('entry');

function showMsg(text, color='#a0321f'){
  msg.style.color = color;
  msg.textContent = text;
  if(text) setTimeout(()=>{ if(msg.textContent===text) msg.textContent=''; }, 3500);
}

async function deriveKeyAndDecrypt(password){
  if (!SALT_B64 || SALT_B64.startsWith('REPLACE_') || !IV_B64 || IV_B64.startsWith('REPLACE_') || !CIPHER_B64 || CIPHER_B64.startsWith('REPLACE_')) {
    throw new Error('密文配置未正确填入，请先用 encrypt.py 生成并粘贴到页面顶部。');
  }
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const salt = b64ToBuf(SALT_B64);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const iv = b64ToBuf(IV_B64);
  const cipher = b64ToBuf(CIPHER_B64);
  const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
  return bufToStr(new Uint8Array(plainBuf));
}

function enterFullIframe(url){
  document.documentElement.style.overflow='hidden';
  document.body.style.overflow='hidden';
  entry.remove();
  const loading = document.createElement('div');
  loading.className='loading-overlay';
  loading.textContent='正在加载，请稍候...';
  document.body.appendChild(loading);

  const iframe = document.createElement('iframe');
  iframe.className='full-iframe';
  iframe.src = url;
  iframe.setAttribute('allowfullscreen','');

  let loaded=false;
  iframe.addEventListener('load', ()=>{
    loaded=true;
    if (loading.parentNode) loading.parentNode.removeChild(loading);
  });

  document.body.appendChild(iframe);

  // 超时检测：若未加载，显示阻止提示（不显示或提供任何链接）
  const TIMEOUT = 4000;
  setTimeout(()=>{
    if(!loaded){
      if(loading.parentNode) loading.parentNode.removeChild(loading);
      const blocked = document.createElement('div');
      blocked.className='blocked-overlay';
      blocked.innerHTML = `
        <strong>无法嵌入目标页面</strong>
        <p>目标站点可能设置了阻止被嵌入（例如 X-Frame-Options 或 CSP），因此无法在当前窗口显示。</p>
        <p>出于安全与隐私考虑，本页面不会自动打开或显示目标链接。</p>
        <div style="margin-top:12px; text-align:center;">
          <button id="backBtn" style="padding:10px 14px; border-radius:8px; background:linear-gradient(180deg,var(--accent),var(--accent-dark)); color:#fff; border:0; cursor:pointer;">返回输入密码</button>
        </div>
      `;
      document.body.appendChild(blocked);
      document.getElementById('backBtn').addEventListener('click', ()=>{
        // 为了彻底恢复到初始状态，reload 页面（不会显示明文）
        location.reload();
      });
    }
  }, TIMEOUT);
}

okBtn.addEventListener('click', async ()=>{
  const pw = pwInput.value || '';
  if(!pw){ showMsg('请输入密码'); pwInput.focus(); return; }
  showMsg('验证中...', '#0a6f3a');
  try{
    const url = await deriveKeyAndDecrypt(pw);
    enterFullIframe(url);
  }catch(e){
    console.error(e);
    showMsg('密码错误或解密失败', '#a00');
  }
});

pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') okBtn.click(); });
clearBtn.addEventListener('click', ()=>{ pwInput.value=''; pwInput.focus(); });
</script>
</body>
</html>
