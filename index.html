<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>受保护的链接（请输入密码）</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: #f7f7f8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: #111;
    }

    .box {
      max-width: 720px;
      margin: 2rem auto;
      background: white;
      padding: 1.2rem;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    label { display:block; margin-bottom:.5rem; font-weight:600; }
    input[type="password"]{ width:100%; padding:.6rem; font-size:1rem; box-sizing:border-box; margin-bottom:.6rem; }
    button{ padding:.6rem 1rem; font-size:1rem; cursor:pointer; }
    #msg{ color:#b00; margin-top:.6rem; }

    .full-iframe {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      display: block;
      z-index: 2;
      background: #fff;
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.96);
      z-index: 3;
      font-size: 1rem;
      color: #333;
    }

    .blocked-overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      margin: auto;
      max-width: 760px;
      z-index: 4;
      background: rgba(255,255,255,0.97);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      text-align: left;
    }

    .back-btn {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .hidden { display: none !important; }
    .full-mode { overflow: hidden !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="entry" class="box" aria-labelledby="title">
    <h2 id="title">请输入密码以查看链接</h2>
    <p>输入正确密码后页面将切换为目标页面的全屏显示。</p>

    <label for="pw">密码</label>
    <input id="pw" type="password" placeholder="输入密码" autofocus />
    <div style="margin-top:.5rem;">
      <button id="ok">确认</button>
      <button id="clear" type="button">清空</button>
    </div>
    <div id="msg" role="status" aria-live="polite"></div>
  </div>

<script>
/* 配置 */
const TARGET_URL = "https://www.kdocs.cn/l/caNR1nFxPBGc?R=L1MvMQ==";
const PASSWORD = "1029"; // 明文校验（源码可见）

/* 元素引用 */
const pwInput = document.getElementById('pw');
const okBtn = document.getElementById('ok');
const clearBtn = document.getElementById('clear');
const msg = document.getElementById('msg');
const entry = document.getElementById('entry');

function setMsg(text, color = '#b00') {
  msg.style.color = color;
  msg.textContent = text;
  if (text) {
    setTimeout(()=>{ if (msg.textContent === text) msg.textContent = ''; }, 4000);
  }
}

/* 将页面切换到全屏 iframe（不打开或显示任何外部链接）。若被阻止则只显示提示（无链接/复制）。*/
function showFullIframeStrict() {
  // 防止滚动
  document.documentElement.classList.add('full-mode');
  document.body.classList.add('full-mode');

  // 隐藏密码输入面板（保留在 DOM 中以便可能返回）
  entry.style.display = 'none';

  // loading 覆盖层
  const loading = document.createElement('div');
  loading.className = 'loading-overlay';
  loading.textContent = '正在加载目标页面，请稍候...';
  document.body.appendChild(loading);

  // 创建 iframe 并覆盖视口
  const iframe = document.createElement('iframe');
  iframe.className = 'full-iframe';
  iframe.src = TARGET_URL;
  iframe.setAttribute('allowfullscreen', '');

  let loaded = false;
  iframe.addEventListener('load', () => {
    loaded = true;
    if (loading && loading.parentNode) loading.parentNode.removeChild(loading);
  });

  document.body.appendChild(iframe);

  // 超时后若未加载，显示被阻止提示（没有任何打开/复制链接的控件）
  const timeout = 3500;
  setTimeout(() => {
    if (!loaded) {
      try { if (loading.parentNode) loading.parentNode.removeChild(loading); } catch(e){}
      const blocked = document.createElement('div');
      blocked.className = 'blocked-overlay';
      blocked.innerHTML = `
        <strong>无法嵌入目标页面</strong>
        <p>目标站点可能设置了阻止被嵌入（例如 X-Frame-Options 或 CSP），因此页面无法在当前窗口显示。</p>
        <p>为安全与隐私考虑，页面不会自动打开或提供目标链接。</p>
        <div>
          <button id="backBtn" class="back-btn">返回输入密码</button>
        </div>
      `;
      document.body.appendChild(blocked);

      // 返回按钮：移除 iframe 与提示，恢复密码输入界面
      document.getElementById('backBtn').addEventListener('click', () => {
        // 移除阻止提示
        if (blocked.parentNode) blocked.parentNode.removeChild(blocked);
        // 移除 iframe
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        // 恢复 entry 并允许滚动
        entry.style.display = '';
        document.documentElement.classList.remove('full-mode');
        document.body.classList.remove('full-mode');
        // 清除密码输入并聚焦
        pwInput.value = '';
        pwInput.focus();
      });
    }
  }, timeout);
}

/* 事件绑定 */
okBtn.addEventListener('click', () => {
  const v = pwInput.value || '';
  if (v === PASSWORD) {
    setMsg('密码正确，正在打开目标页面……', '#0a0');
    setTimeout(showFullIframeStrict, 200);
  } else {
    setMsg('密码错误，请重试。', '#b00');
  }
});

clearBtn.addEventListener('click', () => { pwInput.value = ''; pwInput.focus(); });
pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') okBtn.click(); });
</script>
</body>
</html>
