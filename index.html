<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>受保护的链接（请输入密码）</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; background:#f7f7f8; color:#111; }
    .box { max-width:720px; margin:2rem auto; background:white; padding:1.2rem; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.06); }
    label { display:block; margin-bottom:.5rem; font-weight:600; }
    input[type="password"]{ width:100%; padding:.6rem; font-size:1rem; box-sizing:border-box; margin-bottom:.6rem; }
    button{ padding:.6rem 1rem; font-size:1rem; cursor:pointer; }
    #msg{ color:#b00; margin-top:.6rem; }
    /* iframe/fullscreen styles (will be used after correct password) */
    .full-iframe {
      position:fixed;
      inset:0; /* top:0; right:0; bottom:0; left:0 */
      width:100%;
      height:100%;
      border:0;
      margin:0;
      padding:0;
      background: #fff;
      z-index: 9999;
    }
    .loading-overlay {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,0.95);
      z-index: 10000;
      font-size:1rem;
      color:#333;
    }
    .close-btn {
      position:fixed;
      top:10px;
      right:10px;
      z-index:10001;
      background: rgba(0,0,0,0.6);
      color:#fff;
      border:0;
      padding:8px 12px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }
  </style>
</head>
<body>
  <div id="entry" class="box">
    <h2>请输入密码以查看链接</h2>
    <p>输入正确密码后页面将跳转为目标页面的全屏显示；若目标站点阻止嵌入，则会在新标签页打开。</p>

    <label for="pw">密码</label>
    <input id="pw" type="password" placeholder="输入密码" autofocus />
    <div style="margin-top:.5rem;">
      <button id="ok">确认</button>
      <button id="clear" type="button">清空</button>
    </div>
    <div id="msg"></div>
  </div>

<script>
/* 配置 */
const TARGET_URL = "https://www.kdocs.cn/l/caNR1nFxPBGc?R=L1MvMQ==";
const PASSWORD = "1029"; // 明文校验（源码可见）

/* 元素引用 */
const pwInput = document.getElementById('pw');
const okBtn = document.getElementById('ok');
const clearBtn = document.getElementById('clear');
const msg = document.getElementById('msg');
const entry = document.getElementById('entry');

function setMsg(text, color = '#b00') {
  msg.style.color = color;
  msg.textContent = text;
  if (text) setTimeout(()=>{ if (msg.textContent === text) msg.textContent = ''; }, 4000);
}

/* 打开新标签 */
function openInNewTab() {
  window.open(TARGET_URL, '_blank', 'noopener');
}

/* 在当前页面全屏展示 iframe；如果在超时内未触发 load，则回退到新标签打开 */
function showFullIframeWithFallback() {
  // 清空 body 内容
  document.documentElement.scrollTop = 0;
  document.body.innerHTML = '';

  // loading 覆盖层（在 iframe 加载时显示）
  const loading = document.createElement('div');
  loading.className = 'loading-overlay';
  loading.textContent = '正在加载，请稍候...';
  document.body.appendChild(loading);

  // 关闭按钮（用户可以手动返回或打开新页）
  const closeBtn = document.createElement('button');
  closeBtn.className = 'close-btn';
  closeBtn.textContent = '打开新标签';
  closeBtn.title = '在新标签中打开目标链接';
  closeBtn.addEventListener('click', openInNewTab);
  document.body.appendChild(closeBtn);

  // 创建 iframe
  const iframe = document.createElement('iframe');
  iframe.className = 'full-iframe';
  iframe.src = TARGET_URL;
  iframe.setAttribute('allowfullscreen', '');

  // 当 iframe 成功加载时，移除 loading
  let loaded = false;
  const onLoad = () => {
    loaded = true;
    if (loading.parentNode) loading.parentNode.removeChild(loading);
  };
  iframe.addEventListener('load', onLoad);

  document.body.appendChild(iframe);

  // 回退计时：如果在 timeout 毫秒内未触发 load，认为被拦截或加载失败，打开新标签
  const timeout = 3000; // ms
  setTimeout(() => {
    if (!loaded) {
      // 释放当前页面 UI，并在新标签打开目标页
      try { /* clean up if needed */ } catch(e){}
      // 给用户提示
      alert('目标站点可能阻止嵌入（iframe），将会在新标签中打开该链接。');
      openInNewTab();
    }
  }, timeout);
}

/* 事件绑定 */
okBtn.addEventListener('click', () => {
  const v = pwInput.value || '';
  if (v === PASSWORD) {
    setMsg('密码正确，正在打开目标页面……', '#0a0');
    // 延迟一点，让用户看到提示，然后替换页面
    setTimeout(showFullIframeWithFallback, 300);
  } else {
    setMsg('密码错误，请重试。', '#b00');
  }
});

clearBtn.addEventListener('click', () => { pwInput.value = ''; pwInput.focus(); });
pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') okBtn.click(); });
</script>
</body>
</html>
